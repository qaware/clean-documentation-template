# Reference: https://github.com/errata-ai/vale-action

name: Verify
on:
  push:
    branches: [main]
  pull_request: ~

jobs:
  vale:
    name: vale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: errata-ai/vale-action@v2
        with:
          fail_on_error: true
